<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description" content="Board game dashboards by Sam Hartzell – interactive scoring and tracking companions.">
      <title>Board Game Dashboards – Sam Hartzell</title>
    <style>
          body {
                  margin: 0;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                  background-color: #f5f5f5;
                  color: #333;
          }
          .container {
                  max-width: 720px;
                  margin: 0 auto;
                  padding: 80px 24px;
          }
          h1 {
                  font-size: 2.5rem;
                  font-weight: 300;
                  margin: 0 0 8px;
          }
          .tagline {
                  color: #666;
                  font-size: 1.1rem;
                  margin: 0 0 48px;
          }
          .projects {
                  display: grid;
                  gap: 16px;
          }
          .project {
                  display: block;
                  padding: 24px;
                  background: #fff;
                  border: 1px solid #e0e0e0;
                  border-radius: 8px;
                  text-decoration: none;
                  color: inherit;
                  transition: border-color 0.15s, box-shadow 0.15s;
          }
          .project:hover {
                  border-color: #999;
                  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
          }
          .project:focus-visible {
                  outline: 2px solid #333;
                  outline-offset: 2px;
                  border-color: #999;
                  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
          }
          .project h2 {
                  font-size: 1.15rem;
                  font-weight: 600;
                  margin: 0 0 6px;
          }
          .project p {
                  margin: 0;
                  color: #555;
                  font-size: 0.95rem;
                  line-height: 1.5;
          }
          .back {
                  color: #666;
                  font-size: 0.95rem;
                  text-decoration: none;
                  display: inline-block;
                  margin-bottom: 16px;
          }
          .back:hover {
                  color: #333;
          }
        </style>
  </head>
  <body>
      <main class="container">
          <a class="back" href="/">&larr; Back to projects</a>
          <h1>Board Game Dashboards</h1>
          <p class="tagline">Choose a game</p>
          <div class="projects">
                <a class="project" href="/TerraformingMars/">
                        <h2>Terraforming Mars</h2>
                        <p>A companion app for managing resources, milestones, and victory points during your Terraforming Mars sessions.</p>
                </a>
          </div>
      </main>
  </body>
</html>
