<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Board game dashboards by Sam Hartzell – interactive scoring and tracking companions.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Board Game Dashboards – Sam Hartzell</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5;
        color: #333;
      }
      .skip-link {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      .skip-link:focus {
        position: static;
        width: auto;
        height: auto;
        display: inline-block;
        margin: 12px;
        padding: 8px 12px;
        background: #2a3f5f;
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 64px 24px;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 300;
        margin: 0 0 8px;
      }
      .tagline {
        color: #666;
        font-size: 1.1rem;
        margin: 0 0 48px;
      }
      .projects {
        display: grid;
        gap: 16px;
      }
      .project {
        display: block;
        padding: 24px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .project:hover {
        border-color: #2a3f5f;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .project:focus-visible {
        outline: 2px solid #2a3f5f;
        outline-offset: 2px;
        border-color: #2a3f5f;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .project h2 {
        font-size: 1.15rem;
        font-weight: 600;
        margin: 0 0 6px;
      }
      .project p {
        margin: 0;
        color: #555;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .back {
        color: #2a3f5f;
        font-size: 0.95rem;
        text-decoration: none;
        display: inline-block;
        margin-bottom: 16px;
      }
      .back:hover,
      .back:focus-visible {
        text-decoration: underline;
      }
      .site-footer {
        margin-top: 48px;
        padding-top: 24px;
        border-top: 1px solid #e0e0e0;
        color: #666;
        font-size: 0.9rem;
      }
      .site-footer a {
        color: #2a3f5f;
        text-decoration: none;
      }
      .site-footer a:hover,
      .site-footer a:focus-visible {
        text-decoration: underline;
      }
      .site-footer ul {
        list-style: none;
        padding: 0;
        margin: 8px 0 0;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <main id="main" class="container">
      <a class="back" href="/">&larr; Back to projects</a>
      <h1>Board Game Dashboards</h1>
      <p class="tagline">Choose a game</p>
      <div class="projects">
        <a class="project" href="/TerraformingMars/">
          <h2>Terraforming Mars</h2>
          <p>A companion app for managing resources, milestones, and victory points during your Terraforming Mars sessions.</p>
        </a>
      </div>

      <footer class="site-footer">
        <p>Built by Sam Hartzell.</p>
        <ul>
          <li><a href="https://github.com/samhartzell">GitHub</a></li>
          <li><a href="https://github.com/samhartzell/samhartzell.github.io">Site source</a></li>
        </ul>
      </footer>
    </main>
  </body>
</html>
